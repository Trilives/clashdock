version: 2
project_name: clashdock

before:
  hooks:
    - go mod tidy

builds:
  - id: clashdock
    main: ./cmd/clashdock
    binary: clashdock
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{- if eq .Arch "arm" -}}armv{{ .Arm }}{{- else -}}{{ .Arch }}{{- end -}}'
    # 便携包内含内核 + 规则 + 脚本多个文件，包成顶层目录避免解压时污染当前目录。
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md
      # 自安装脚本（等效 sudo apt install clashdock_*.deb）
      - src: scripts/portable/install.sh
        dst: install.sh
        info:
          mode: 0755
      - src: scripts/portable/uninstall.sh
        dst: uninstall.sh
        info:
          mode: 0755
      # mihomo 内核（按架构选取；MIT，见 deps/copyright / deps/LICENSE.mihomo）
      - src: 'packaging/deps/{{- if eq .Arch "arm" -}}armv{{ .Arm }}{{- else -}}{{ .Arch }}{{- end -}}/mihomo'
        dst: deps/mihomo
        info:
          mode: 0755
      # 基础规则种子：离线启动够用，之后可在线更新更大的规则文件
      - src: packaging/deps/rules/geosite.dat
        dst: deps/rules/geosite.dat
      - src: packaging/deps/rules/country.mmdb
        dst: deps/rules/country.mmdb
      # 许可与归属（与 deb 一致）
      - src: packaging/copyright
        dst: deps/copyright
      - src: packaging/deps/LICENSE.mihomo
        dst: deps/LICENSE.mihomo

nfpms:
  - id: deb
    package_name: clashdock
    formats: [deb]
    vendor: Trilives
    homepage: https://github.com/Trilives/clashdock
    maintainer: Trilives <trlives.j@gmail.com>
    description: |-
      Interactive TUI to deploy and manage mihomo (Clash.Meta) on Linux.
      Bundles the mihomo core and basic rule files so the service can start
      offline right after installation; larger rule data can be updated online.
    license: MIT
    section: net
    contents:
      # mihomo 内核（MIT，见 copyright / LICENSE.mihomo）
      - src: 'packaging/deps/{{- if eq .Arch "arm" -}}armv{{ .Arm }}{{- else -}}{{ .Arch }}{{- end -}}/mihomo'
        dst: /usr/libexec/clashdock/mihomo
        file_info:
          mode: 0755
      # 基础规则种子：先能离线启动，之后可在线更新更大的规则文件
      - src: packaging/deps/rules/geosite.dat
        dst: /usr/share/clashdock/ruleset/geosite.dat
      - src: packaging/deps/rules/country.mmdb
        dst: /usr/share/clashdock/ruleset/country.mmdb
      # 许可与归属
      - src: packaging/copyright
        dst: /usr/share/doc/clashdock/copyright
      - src: packaging/deps/LICENSE.mihomo
        dst: /usr/share/doc/clashdock/LICENSE.mihomo

checksum:
  name_template: checksums.txt

# prerelease: auto 让打了 semver 预发布后缀的 tag（如 v0.1.7-beta.1）自动标记
# 为 GitHub prerelease：不会顶替"Latest release"，也不会被 /releases/latest
# 接口返回——self-update 的稳定渠道天然只看得到正式版，预览渠道另走 /releases
# 列表读取最新一项（见 internal/selfupdate）。
#
# extra_files 额外把运行时目录迁移脚本作为独立 release 资产上传（不进 tar.gz/deb），
# 供从 /etc/mihomo 旧路径升级的用户下载单独运行，见 scripts/migrate-runtime-dir.sh。
release:
  prerelease: auto
  extra_files:
    - glob: ./scripts/migrate-runtime-dir.sh

changelog:
  sort: asc
  groups:
    - title: "Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "Fixes"
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
